# Put this file in /etc/nginx/conf.d/stage-manager.conf on the server,
# then change server_name and proxy port as needed.
#
# This config assumes the Docker container is started like:
# docker run -d --name stage-manager --restart unless-stopped \
#   --env-file /path/to/backend/.env \
#   -p 127.0.0.1:8080:8080 \
#   stage-manager

server {
    listen 80;
    server_name your-domain.example.com;

    client_max_body_size 200m;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
